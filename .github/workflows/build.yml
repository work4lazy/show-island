name: Build and Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Windows EXE (Nuitka)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python pillow pynput pystray numpy nuitka

      - name: Build with Nuitka (standalone)
        id: build
        run: |
          python -m nuitka `
            --onefile `
            --windows-console-mode=disable `
            --assume-yes-for-downloads `
            --enable-plugin=tk-inter `
            --include-package=cv2 `
            --include-package=numpy `
            --include-package=PIL `
            --include-package=pynput `
            --include-package=pystray `
            --output-dir=build `
            --output-filename=ShowIsland `
            src/main.py

      - name: Bundle assets
        run: |
          $distDir = "dist"
          New-Item -ItemType Directory -Force -Path $distDir | Out-Null
          Copy-Item -Path "build\ShowIsland.exe" -Destination "$distDir\" -Force
          Copy-Item -Path config.toml -Destination "$distDir\" -Force
          if (Test-Path templates) {
            Copy-Item -Path templates -Destination "$distDir\templates\" -Recurse -Force
          }
          Write-Host "Assets bundled into $distDir"

      - name: Archive build
        run: |
          Compress-Archive -Path "dist\*" -DestinationPath "ShowIsland-windows-x64.zip"
          Write-Host "Archive created: ShowIsland-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShowIsland-windows-x64
          path: ShowIsland-windows-x64.zip
          retention-days: 30

      - name: Set release variables
        id: release_vars
        run: |
          if ("${{ github.ref }}" -like "refs/tags/v*") {
            # 正式版本 tag → 使用 tag 名称
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $env:GITHUB_ENV
            echo "RELEASE_NAME=Release ${{ github.ref_name }}" >> $env:GITHUB_ENV
            echo "IS_PRERELEASE=false" >> $env:GITHUB_ENV
          } else {
            # master/main 分支推送 → 生成日期标签
            $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
            $shortSha = "${{ github.sha }}".Substring(0, 7)
            echo "RELEASE_TAG=dev-$timestamp-$shortSha" >> $env:GITHUB_ENV
            echo "RELEASE_NAME=Development Build ($timestamp)" >> $env:GITHUB_ENV
            echo "IS_PRERELEASE=true" >> $env:GITHUB_ENV
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: ${{ env.IS_PRERELEASE }}
          body: |
            ## 下载

            [ShowIsland-windows-x64.zip](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/ShowIsland-windows-x64.zip)

            ## 使用说明

            1. 解压 ZIP 到任意目录
            2. 编辑 `config.toml` 配置快捷键和模板
            3. 将模板图片放入 `templates/` 目录
            4. 运行 `ShowIsland.exe`

            ## 包含文件

            | 文件 | 说明 |
            |------|------|
            | `ShowIsland.exe` | 主程序 |
            | `config.toml` | 配置文件 |
            | `templates/` | 模板图片目录 |
          files: ShowIsland-windows-x64.zip
          generate_release_notes: true
